services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: uro-web:local
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    restart: unless-stopped
    depends_on:
      - web